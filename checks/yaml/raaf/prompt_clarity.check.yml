name: PromptClarity
description: AI check for vague or contradictory RAAF system prompt instructions
category: RAAF
severity: warning
files: "app/ai/**/*.rb"
requires:
  - source
ai:
  provider: test
  temperature: 0
  max_tokens: 512
  schema:
    type: array
    items:
      type: object
      properties:
        line: { type: integer }
        message: { type: string }
prompt: |
  Analyze this RAAF agent's system prompt for clarity.

  Flag: vague instructions ("do your best", "be helpful"), contradictory
  requirements, missing output format specification, ambiguous scope,
  or instructions that could be interpreted multiple ways.

  Source:
  {{source}}
